<style>
:root{--red:#e74c3c;--green:#27ae60;--bg:#f5f5f5;--card:#fff;--text:#333;--text2:#888;--border:#e0e0e0;--primary:#3498db;--nav-h:56px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);max-width:600px;margin:0 auto;min-height:100vh;padding-bottom:calc(var(--nav-h) + 20px);-webkit-tap-highlight-color:transparent}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;height:var(--nav-h);background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:var(--text2);font-size:11px;gap:3px;padding:6px 12px;border-radius:8px;transition:all .2s}
.bottom-nav a.active{color:var(--primary);background:rgba(52,152,219,.1)}
.bottom-nav a .icon{font-size:22px;line-height:1}
.page-header{padding:16px 16px 12px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.page-header h1{font-size:20px;font-weight:700}
.page-header .subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.card{background:var(--card);border-radius:12px;padding:16px;margin:12px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-header h2{font-size:16px;font-weight:600}
.card-header .badge{font-size:12px;color:var(--text2);background:var(--bg);padding:3px 10px;border-radius:12px;text-decoration:none;cursor:pointer}
.rank-list{list-style:none}
.rank-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;cursor:pointer}
.rank-item:last-child{border-bottom:none}
.rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rank-num.t1{background:#f39c12;color:#fff}
.rank-num.t2{background:#bdc3c7;color:#fff}
.rank-num.t3{background:#e67e22;color:#fff}
.rank-num.n{background:#eee;color:#999}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:15px;font-weight:600}
.rank-sub{font-size:12px;color:var(--text2);margin-top:1px}
.rank-amount{font-size:17px;font-weight:700;text-align:right;white-space:nowrap}
.ar{color:var(--red)}.ag{color:var(--green)}.a0{color:#999}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat-item{background:var(--bg);border-radius:10px;padding:12px;text-align:center}
.stat-value{font-size:22px;font-weight:700}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:6px}
.form-group input,.form-group select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;background:var(--card);color:var(--text);-webkit-appearance:none;appearance:none}
.form-group input:focus,.form-group select:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(52,152,219,.15)}
.input-row{display:flex;gap:10px}
.input-row .form-group{flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;-webkit-appearance:none;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff;width:100%}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary)}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:8px}
.person-picker{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pick-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.pick-item.sel{border-color:var(--primary);background:rgba(52,152,219,.06)}
.pick-item .av{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.pick-item .pn{font-size:14px;font-weight:500;flex:1}
.batch-rows{display:flex;flex-direction:column;gap:8px}
.batch-row{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg);border-radius:10px}
.batch-row .bn{width:70px;font-size:14px;font-weight:600;flex-shrink:0}
.batch-row input{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;text-align:center;width:80px}
.batch-row input:focus{border-color:var(--primary);outline:none}
.batch-row .nv{width:60px;text-align:right;font-size:15px;font-weight:700;flex-shrink:0}
.record-list{list-style:none}
.record-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;cursor:pointer}
.record-date{font-size:12px;color:var(--text2);flex-shrink:0;width:75px}
.record-name{font-size:15px;font-weight:600;flex:1}
.record-detail{text-align:right;flex-shrink:0}
.record-detail .lose{color:var(--red);font-size:14px;font-weight:600}
.record-detail .win{color:var(--green);font-size:14px;font-weight:600}
.person-header{text-align:center;padding:24px 16px;background:var(--card);border-bottom:1px solid var(--border)}
.person-av{width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto 10px}
.person-name{font-size:20px;font-weight:700}
.person-balance{font-size:32px;font-weight:800;margin-top:6px}
.person-stats{display:flex;justify-content:center;gap:30px;margin-top:12px}
.ps{text-align:center}.ps .v{font-size:18px;font-weight:700}.ps .l{font-size:12px;color:var(--text2)}
.chart-container{position:relative;width:100%;height:220px}
.chart-container canvas{width:100%!important}
.filter-bar{display:flex;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border)}
.filter-bar input,.filter-bar select{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg)}
.monthly-table{width:100%;border-collapse:collapse;font-size:14px}
.monthly-table th,.monthly-table td{padding:10px 8px;text-align:center;border-bottom:1px solid var(--border)}
.monthly-table th{font-size:12px;color:var(--text2);font-weight:500;background:var(--bg)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.pagination{display:flex;justify-content:center;gap:8px;padding:16px;flex-wrap:wrap}
.pagination button{padding:8px 14px;border:1px solid var(--border);background:var(--card);border-radius:8px;font-size:14px;cursor:pointer}
.pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pagination button:disabled{opacity:.4}
.page-panel{display:none}
.page-panel.active{display:block}
/* 弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:150;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--card);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:600px;max-height:80vh;overflow-y:auto}
.modal-sheet h3{font-size:17px;margin-bottom:16px}
.modal-sheet .close-btn{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:0 4px}
.person-list{list-style:none;max-height:50vh;overflow-y:auto}
.person-list li{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:15px;gap:8px}
.person-list li .pinfo{flex:1;min-width:0}
.person-list li .pinfo .pname2{font-weight:600}
.person-list li .pinfo .pdebt{font-size:12px;color:var(--text2)}
.person-list li .pactions{display:flex;gap:6px;flex-shrink:0}
.person-list li .pactions button{font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);cursor:pointer}
.person-list li .pactions button.danger{color:var(--red);border-color:var(--red)}
/* 删除/编辑记录按钮 */
.record-item .rec-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .2s}
.record-item:hover .rec-actions,.record-item:active .rec-actions{opacity:1}
.rec-actions button{background:none;border:none;color:var(--text2);font-size:16px;cursor:pointer;padding:4px 6px}
</style>
</head>

let DB = null;
let dbReady = false;
let dbReadyCallbacks = [];

function onDBReady(fn) { if (dbReady) fn(); else dbReadyCallbacks.push(fn); }

async function loadFromGist() {
  try {
    const resp = await fetch(`${WORKER_URL}/data`);
    if (!resp.ok) throw new Error('Worker fetch failed: ' + resp.status);
    const content = await resp.text();
    if (content && content !== '{}') {
      DB = JSON.parse(content);
      return true;
    }
  } catch(e) { console.warn('Worker load failed:', e); }
  return false;
}

async function saveToGist() {
  try {
    const resp = await fetch(`${WORKER_URL}/data`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(DB)
    });
    if (!resp.ok) { const t = await resp.text(); throw new Error(t); }
    return true;
  } catch(e) { console.warn('Worker save failed:', e); return false; }
}

function saveDB() {
  localStorage.setItem('ledger_local_backup', JSON.stringify(DB));
  saveToGist();
}

async function initDB() {
  const loaded = await loadFromGist();
  if (!loaded) {
    const maxPid = PRELOAD_PERSONS.reduce((m,p)=>Math.max(m,p.id),0);
    const maxRid = PRELOAD_RECORDS.reduce((m,r)=>Math.max(m,r.id),0);
    DB = { persons: PRELOAD_PERSONS, records: PRELOAD_RECORDS, nextPid: maxPid+1, nextRid: maxRid+1 };
    await saveToGist();
  }
  dbReady = true;
  dbReadyCallbacks.forEach(fn => fn());
  dbReadyCallbacks = [];
}

function getBalance(pid) {
  const p = DB.persons.find(x => x.id === pid);
  if (!p) return 0;
  let net = 0;
  DB.records.filter(r => r.person_id === pid).forEach(r => net += r.lose - r.win);
  return p.initial_debt + net;
}

function getPersons() { return DB.persons.filter(p => p.active !== false); }

// ==================== UI工具 ====================
function $(id) { return document.getElementById(id); }
function fm(v) { if(v===0)return'0'; return v>0?'+'+v.toLocaleString():v.toLocaleString(); }
function ac(v) { if(v>0)return'ar'; if(v<0)return'ag'; return'a0'; }
function showToast(msg) { const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000); }

let currentPage = 'dashboard';
let personChart = null;
let histPage = 1;
const PER_PAGE = 50;

function navigate(page, pid) {
  currentPage = page;
  document.querySelectorAll('.bottom-nav a').forEach(a => a.classList.remove('active'));
  document.querySelector('[data-nav="'+page+'"]').classList.add('active');
  
  const app = $('app');
  if (page === 'dashboard') app.innerHTML = renderDashboard();
  else if (page === 'input') app.innerHTML = renderInput();
  else if (page === 'ranking') app.innerHTML = renderRanking();
  else if (page === 'history') app.innerHTML = renderHistory();
  else if (page === 'person') app.innerHTML = renderPerson(pid);
  else if (page === 'manage') app.innerHTML = renderManage();
  
  window.scrollTo(0, 0);
}

// ==================== 仪表盘 ====================
function renderDashboard() {
  const today = new Date().toISOString().slice(0,10);
  const thisMonth = today.slice(0,7);
  const persons = getPersons();
  
  let monthLose=0, monthWin=0;
  DB.records.filter(r => r.date.startsWith(thisMonth)).forEach(r => { monthLose+=r.lose; monthWin+=r.win; });
  
  const ranking = persons.map(p => {
    let tl=0, tw=0;
    DB.records.filter(r=>r.person_id===p.id).forEach(r=>{tl+=r.lose;tw+=r.win;});
    return {...p, total_lose:tl, total_win:tw, balance:p.initial_debt+tl-tw};
  }).sort((a,b)=>b.balance-a.balance);
  
  const totalDebt = ranking.reduce((s,r) => s + (r.balance > 0 ? r.balance : 0), 0);
  const top10 = ranking.slice(0, 10);
  
  return `
    <div class="page-header"><h1>💰 账本</h1><div class="subtitle">${today}</div></div>
    <div class="card">
      <div class="stats-grid">
        <div class="stat-item"><div class="stat-value">${persons.length}</div><div class="stat-label">参与人数</div></div>
        <div class="stat-item"><div class="stat-value">${DB.records.length}</div><div class="stat-label">总记录数</div></div>
        <div class="stat-item"><div class="stat-value ar">${totalDebt.toLocaleString()}</div><div class="stat-label">总欠款</div></div>
        <div class="stat-item"><div class="stat-value ar">${monthLose.toLocaleString()}</div><div class="stat-label">本月总输</div></div>
        <div class="stat-item"><div class="stat-value ag">${monthWin.toLocaleString()}</div><div class="stat-label">本月总赢</div></div>
        <div class="stat-item"><div class="stat-value">${(monthLose-monthWin)>0?'+':''}${(monthLose-monthWin).toLocaleString()}</div><div class="stat-label">本月净额</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h2>🏆 欠款排行</h2><span class="badge" onclick="navigate('ranking')">查看全部 →</span></div>
      <ul class="rank-list">${top10.map((r,i) => `
        <li class="rank-item" onclick="navigate('person',${r.id})">
          <div class="rank-num ${i<3?['t1','t2','t3'][i]:'n'}">${i+1}</div>
          <div class="rank-info"><div class="rank-name">${r.name}</div><div class="rank-sub">总输${r.total_lose} / 总赢${r.total_win}</div></div>
          <div class="rank-amount ${ac(r.balance)}">${fm(r.balance)}</div>
        </li>`).join('')}</ul>
    </div>`;
}

// ==================== 录入 ====================
function renderInput() {
  const today = new Date().toISOString().slice(0,10);
  const persons = getPersons();
  const todayRecs = DB.records.filter(r => r.date === today);
  const todayMap = {};
  todayRecs.forEach(r => todayMap[r.person_id] = r);
  
  // 用 setTimeout 确保 DOM 渲染后绑定事件
  setTimeout(() => {
    const modeBtn = document.getElementById('mode-btn');
    if (modeBtn) modeBtn.onclick = toggleMode;
    const saveBtn = document.getElementById('save-single-btn');
    if (saveBtn) saveBtn.onclick = saveSingle;
    const saveBatchBtn = document.getElementById('save-batch-btn');
    if (saveBatchBtn) saveBatchBtn.onclick = saveBatch;
    document.querySelectorAll('.pick-item').forEach(el => el.onclick = function(){ togglePerson(this); });
  }, 0);
  
  return `
    <div class="page-header"><h1>✏️ 录入输赢</h1><div class="subtitle" id="hdr-date">${today}</div></div>
    <div class="card">
      <div class="form-group"><label>日期</label><input type="date" id="rec-date" value="${today}" onchange="document.getElementById('hdr-date').textContent=this.value"></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>录入</h2><button class="btn btn-sm btn-outline" id="mode-btn">批量模式</button></div>
      <div id="single-mode">
        <div class="form-group"><label>选择人员</label><select id="single-person"><option value="">-- 请选择 --</option>${persons.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
        <div class="input-row">
          <div class="form-group"><label>输（输了多少）</label><input type="number" id="single-lose" placeholder="0" step="1" inputmode="numeric"></div>
          <div class="form-group"><label>赢（赢了多少）</label><input type="number" id="single-win" placeholder="0" step="1" inputmode="numeric"></div>
        </div>
        <button class="btn btn-primary" id="save-single-btn">保存</button>
      </div>
      <div id="batch-mode" style="display:none">
        <div class="form-group"><label>选择人员（点击选中）</label><div class="person-picker" id="person-picker">${persons.map(p=>`<div class="pick-item" data-id="${p.id}"><div class="av">${p.name[0]}</div><div class="pn">${p.name}</div></div>`).join('')}</div></div>
        <div class="batch-rows" id="batch-rows"></div>
        <button class="btn btn-primary" id="save-batch-btn" style="margin-top:12px">全部保存</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h2>📋 ${today} 已有记录</h2></div>
      ${Object.keys(todayMap).length ? `<ul class="rank-list">${Object.values(todayMap).map(r => {
        const p = persons.find(x=>x.id===r.person_id);
        return `<li class="rank-item" onclick="navigate('person',${r.person_id})"><div class="rank-info"><div class="rank-name">${p?p.name:'?'}</div><div class="rank-sub">输<span class="ar">${r.lose}</span> 赢<span class="ag">${r.win}</span></div></div><div class="rank-amount ${ac(r.lose-r.win)}">${fm(r.lose-r.win)}</div></li>`;
      }).join('')}</ul>` : '<div class="empty-state"><p>今天还没有记录</p></div>'}
    </div>`;
}

let inputBatch = false;
function toggleMode() {
  inputBatch = !inputBatch;
  const sm = document.getElementById('single-mode');
  const bm = document.getElementById('batch-mode');
  const mb = document.getElementById('mode-btn');
  if (sm) sm.style.display = inputBatch ? 'none' : 'block';
  if (bm) bm.style.display = inputBatch ? 'block' : 'none';
  if (mb) mb.textContent = inputBatch ? '单人模式' : '批量模式';
}

function togglePerson(el) { el.classList.toggle('sel'); renderBatchRows(); }

function renderBatchRows() {
  const sel = document.querySelectorAll('.pick-item.sel');
  const cont = document.getElementById('batch-rows');
  if (!cont) return;
  cont.innerHTML = '';
  sel.forEach(el => {
    const id = el.dataset.id;
    const name = el.querySelector('.pn').textContent;
    cont.innerHTML += `<div class="batch-row"><div class="bn">${name}</div><input type="number" placeholder="输" step="1" inputmode="numeric" data-id="${id}" data-type="lose" oninput="updateBatchNet(this)"><input type="number" placeholder="赢" step="1" inputmode="numeric" data-id="${id}" data-type="win" oninput="updateBatchNet(this)"><div class="nv" id="net-${id}">0</div></div>`;
  });
}

function updateBatchNet(el) {
  const row = el.closest('.batch-row');
  const id = el.dataset.id;
  const lose = parseFloat(row.querySelector('[data-type="lose"]').value) || 0;
  const win = parseFloat(row.querySelector('[data-type="win"]').value) || 0;
  const netEl = document.getElementById('net-'+id);
  if (netEl) { const net = lose-win; netEl.textContent = net>0?'+'+net:net; netEl.className = 'nv '+(net>0?'ar':net<0?'ag':'a0'); }
}

function saveRecord(pid, date, lose, win) {
  const existing = DB.records.find(r => r.person_id === pid && r.date === date);
  if (existing) { existing.lose = lose; existing.win = win; }
  else { DB.records.push({ id: DB.nextRid++, person_id: pid, date, lose, win }); }
  saveDB();
}

function saveSingle() {
  const pid = parseInt(document.getElementById('single-person').value);
  if (!pid) { showToast('请选择人员'); return; }
  const date = document.getElementById('rec-date').value;
  const lose = parseFloat(document.getElementById('single-lose').value) || 0;
  const win = parseFloat(document.getElementById('single-win').value) || 0;
  saveRecord(pid, date, lose, win);
  showToast('保存成功');
  navigate('input');
}

function saveBatch() {
  const date = document.getElementById('rec-date').value;
  const rows = document.querySelectorAll('#batch-rows .batch-row');
  if (!rows.length) { showToast('请先选择人员'); return; }
  let cnt = 0;
  for (const row of rows) {
    const lose = parseFloat(row.querySelector('[data-type="lose"]').value) || 0;
    const win = parseFloat(row.querySelector('[data-type="win"]').value) || 0;
    if (lose===0 && win===0) continue;
    const pid = parseInt(row.querySelector('[data-type="lose"]').dataset.id);
    saveRecord(pid, date, lose, win);
    cnt++;
  }
  showToast('已保存 '+cnt+' 条记录');
  navigate('input');
}

// ==================== 排行榜 ====================
function renderRanking() {
  const persons = getPersons();
  const ranking = persons.map(p => {
    let tl=0, tw=0;
    DB.records.filter(r=>r.person_id===p.id).forEach(r=>{tl+=r.lose;tw+=r.win;});
    return {...p, total_lose:tl, total_win:tw, balance:p.initial_debt+tl-tw};
  }).sort((a,b)=>b.balance-a.balance);
  
  setTimeout(() => {
    const sb = document.getElementById('sort-by');
    if (sb) sb.onchange = sortRanking;
  }, 0);
  
  return `
    <div class="page-header"><h1>🏆 排行榜</h1><div class="subtitle">按剩余欠款从高到低</div></div>
    <div class="card" style="padding:8px 16px">
      <div class="filter-bar" style="padding:0;border:none">
        <select id="sort-by"><option value="balance">剩余欠款</option><option value="total_lose">总输</option><option value="total_win">总赢</option></select>
      </div>
    </div>
    <div class="card">
      <ul class="rank-list" id="rank-list">${ranking.map((r,i) => `
        <li class="rank-item" onclick="navigate('person',${r.id})" data-balance="${r.balance}" data-lose="${r.total_lose}" data-win="${r.total_win}">
          <div class="rank-num ${i<3?['t1','t2','t3'][i]:'n'}">${i+1}</div>
          <div class="rank-info"><div class="rank-name">${r.name}</div><div class="rank-sub">总输<span class="ar">${r.total_lose}</span> 总赢<span class="ag">${r.total_win}</span></div></div>
          <div class="rank-amount ${ac(r.balance)}">${fm(r.balance)}</div>
        </li>`).join('')}</ul>
    </div>`;
}

function sortRanking() {
  const by = document.getElementById('sort-by').value;
  const list = document.getElementById('rank-list');
  const items = Array.from(list.querySelectorAll('.rank-item'));
  const key = by === 'balance' ? 'balance' : by;
  items.sort((a,b) => parseFloat(b.dataset[key]) - parseFloat(a.dataset[key]));
  items.forEach((item,i) => {
    const numEl = item.querySelector('.rank-num');
    numEl.textContent = i+1;
    numEl.className = 'rank-num '+(i<3?['t1','t2','t3'][i]:'n');
    list.appendChild(item);
  });
}

// ==================== 历史记录 ====================
function renderHistory() {
  const persons = getPersons();
  const records = [...DB.records].sort((a,b) => b.date.localeCompare(a.date) || b.id-a.id);
  const total = records.length;
  
  setTimeout(() => {
    document.getElementById('hfilter-person').onchange = ()=>renderHistFiltered(1);
    document.getElementById('hfilter-from').onchange = ()=>renderHistFiltered(1);
    document.getElementById('hfilter-to').onchange = ()=>renderHistFiltered(1);
    renderHistFiltered(1);
  }, 0);
  
  return `
    <div class="page-header"><h1>📋 历史记录</h1><div class="subtitle">共 ${total} 条</div></div>
    <div class="filter-bar">
      <select id="hfilter-person"><option value="">全部人员</option>${persons.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select>
      <input type="date" id="hfilter-from" placeholder="开始日期">
      <input type="date" id="hfilter-to" placeholder="结束日期">
    </div>
    <div class="card"><ul class="record-list" id="hist-list"></ul><div class="pagination" id="hist-pag"></div></div>`;
}

function renderHistFiltered(page) {
  histPage = page || 1;
  const persons = getPersons();
  const pid = document.getElementById('hfilter-person').value;
  const from = document.getElementById('hfilter-from').value;
  const to = document.getElementById('hfilter-to').value;
  
  let records = [...DB.records];
  if (pid) records = records.filter(r => r.person_id === parseInt(pid));
  if (from) records = records.filter(r => r.date >= from);
  if (to) records = records.filter(r => r.date <= to);
  records.sort((a,b) => b.date.localeCompare(a.date) || b.id-a.id);
  
  const total = records.length;
  const pages = Math.ceil(total / PER_PAGE);
  const start = (histPage-1) * PER_PAGE;
  const pageData = records.slice(start, start + PER_PAGE);
  
  const list = document.getElementById('hist-list');
  const pag = document.getElementById('hist-pag');
  
  list.innerHTML = pageData.length ? pageData.map(r => {
    const p = persons.find(x=>x.id===r.person_id);
    const net = r.lose - r.win;
    return `<li class="record-item"><div class="record-date">${r.date}</div><div class="record-name" onclick="navigate('person',${r.person_id})">${p?p.name:'?'}</div><div class="record-detail"><div><span class="lose">输${r.lose}</span> <span class="win">赢${r.win}</span></div><div class="${ac(net)}">${fm(net)}</div></div><div class="rec-actions"><button onclick="event.stopPropagation();editRecord(${r.id})" title="编辑">✏️</button><button onclick="event.stopPropagation();deleteRecord(${r.id})" title="删除">🗑</button></div></li>`;
  }).join('') : '<div class="empty-state"><p>没有找到记录</p></div>';
  
  if (pages <= 1) { pag.innerHTML = ''; return; }
  let h = '';
  if (histPage>1) h+=`<button onclick="renderHistFiltered(${histPage-1})">上一页</button>`;
  for (let i=1;i<=pages;i++) h+=`<button class="${i===histPage?'active':''}" onclick="renderHistFiltered(${i})">${i}</button>`;
  if (histPage<pages) h+=`<button onclick="renderHistFiltered(${histPage+1})">下一页</button>`;
  pag.innerHTML = h;
}

// ==================== 个人详情 ====================
function renderPerson(pid) {
  const p = DB.persons.find(x => x.id === pid);
  if (!p) return '<div class="empty-state"><p>人员不存在</p></div>';
  
  const balance = getBalance(pid);
  const records = DB.records.filter(r => r.person_id === pid).sort((a,b) => a.date.localeCompare(b.date));
  
  let tl=0, tw=0;
  records.forEach(r => { tl+=r.lose; tw+=r.win; });
  
  // 余额变化数据
  let running = p.initial_debt;
  const dates = [], balances = [];
  records.forEach(r => {
    running += r.lose - r.win;
    dates.push(r.date);
    balances.push(running);
  });
  
  // 月度汇总
  const monthly = {};
  records.forEach(r => {
    const m = r.date.slice(0,7);
    if (!monthly[m]) monthly[m] = {lose:0, win:0};
    monthly[m].lose += r.lose;
    monthly[m].win += r.win;
  });
  const monthlyArr = Object.entries(monthly).sort((a,b) => b[0].localeCompare(a[0]));
  
  // 最近30条
  const recent = [...records].reverse().slice(0, 30);
  
  // 延迟画图表
  setTimeout(() => {
    if (dates.length > 0) {
      if (personChart) personChart.destroy();
      const ctx = document.getElementById('balance-chart');
      if (!ctx) return;
      personChart = new Chart(ctx, {
        type: 'line',
        data: { labels: dates, datasets: [{ label:'剩余欠款', data:balances, borderColor:'#e74c3c', backgroundColor:'rgba(231,76,60,0.05)', fill:true, tension:.3, pointRadius:0, borderWidth:2 }] },
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{maxTicksLimit:8,font:{size:11}},grid:{display:false}},y:{ticks:{font:{size:11},callback:v=>v>0?'+'+v:v},grid:{color:'#f0f0f0'}}}}
      });
    }
  }, 200);
  
  return `
    <div class="person-header">
      <div class="person-av">${p.name[0]}</div>
      <div class="person-name">${p.name}</div>
      <div class="person-balance ${ac(balance)}">${fm(balance)}</div>
      <div class="person-stats">
        <div class="ps"><div class="v ar">${tl.toLocaleString()}</div><div class="l">总输</div></div>
        <div class="ps"><div class="v ag">${tw.toLocaleString()}</div><div class="l">总赢</div></div>
        <div class="ps"><div class="v">${p.initial_debt}</div><div class="l">初始欠款</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h2>📈 余额变化趋势</h2></div>
      <div class="chart-container"><canvas id="balance-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>📅 月度汇总</h2></div>
      <div style="overflow-x:auto"><table class="monthly-table"><thead><tr><th>月份</th><th>输</th><th>赢</th><th>净额</th></tr></thead><tbody>${monthlyArr.map(m => `<tr><td>${m[0]}</td><td class="ar">${m[1].lose.toLocaleString()}</td><td class="ag">${m[1].win.toLocaleString()}</td><td class="${ac(m[1].lose-m[1].win)}">${fm(m[1].lose-m[1].win)}</td></tr>`).join('')}</tbody></table></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>📋 最近记录</h2></div>
      <ul class="record-list">${recent.map(r => `<li class="record-item"><div class="record-date">${r.date}</div><div class="rank-name">输<span class="ar">${r.lose}</span> 赢<span class="ag">${r.win}</span></div><div class="rank-amount ${ac(r.lose-r.win)}">${fm(r.lose-r.win)}</div><div class="rec-actions"><button onclick="event.stopPropagation();editRecord(${r.id})" title="编辑">✏️</button><button onclick="event.stopPropagation();deleteRecord(${r.id})" title="删除">🗑</button></div></li>`).join('')}</ul>
    </div>
    <div style="text-align:center;padding:16px">
      <button class="btn btn-outline btn-sm" onclick="navigate('dashboard')">← 返回仪表盘</button>
    </div>`;
}

// ==================== 删除/编辑记录 ====================
function deleteRecord(rid) {
  if (!confirm('确定删除这条记录吗？')) return;
  DB.records = DB.records.filter(r => r.id !== rid);
  saveDB();
  showToast('已删除');
  navigate(currentPage);
}

function editRecord(rid) {
  const rec = DB.records.find(r => r.id === rid);
  if (!rec) return;
  const persons = getPersons();
  
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-sheet">
      <h3>修改记录 <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✕</button></h3>
      <div class="form-group"><label>日期</label><input type="date" id="edit-date" value="${rec.date}"></div>
      <div class="form-group"><label>人员</label><select id="edit-person">${persons.map(p=>`<option value="${p.id}" ${p.id===rec.person_id?'selected':''}>${p.name}</option>`).join('')}</select></div>
      <div class="input-row">
        <div class="form-group"><label>输</label><input type="number" id="edit-lose" value="${rec.lose}" step="1" inputmode="numeric"></div>
        <div class="form-group"><label>赢</label><input type="number" id="edit-win" value="${rec.win}" step="1" inputmode="numeric"></div>
      </div>
      <button class="btn btn-primary" id="save-edit-btn">保存修改</button>
    </div>`;
  document.body.appendChild(overlay);
  
  overlay.querySelector('#save-edit-btn').onclick = function() {
    const newDate = overlay.querySelector('#edit-date').value;
    const newPid = parseInt(overlay.querySelector('#edit-person').value);
    const newLose = parseFloat(overlay.querySelector('#edit-lose').value) || 0;
    const newWin = parseFloat(overlay.querySelector('#edit-win').value) || 0;
    
    // 检查日期+人员是否和已有其他记录冲突
    const conflict = DB.records.find(r => r.person_id === newPid && r.date === newDate && r.id !== rid);
    if (conflict) {
      showToast('该人员此日期已有记录，请先删除那条');
      return;
    }
    
    rec.date = newDate;
    rec.person_id = newPid;
    rec.lose = newLose;
    rec.win = newWin;
    saveDB();
    overlay.remove();
    showToast('已修改');
    navigate(currentPage);
  };
  
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
}

// ==================== 人员管理 ====================
function renderManage() {
  const persons = getPersons();
  return `
    <div class="page-header"><h1>👥 人员管理</h1><div class="subtitle">${persons.length} 人</div></div>
    <div class="card">
      <div class="card-header"><h2>添加人员</h2></div>
      <div class="input-row">
        <div class="form-group" style="flex:2"><input type="text" id="new-name" placeholder="姓名"></div>
        <div class="form-group" style="flex:1"><input type="number" id="new-debt" placeholder="初始欠款" step="1"></div>
      </div>
      <button class="btn btn-primary" onclick="addPerson()">添加</button>
    </div>
    <div class="card">
      <div class="card-header"><h2>人员列表</h2><span class="badge">点击改名</span></div>
      <ul class="person-list">${persons.map(p => {
        const balance = getBalance(p.id);
        return `<li>
          <div class="pinfo"><div class="pname2">${p.name}</div><div class="pdebt">初始${p.initial_debt} · 余额<span class="${ac(balance)}">${fm(balance)}</span></div></div>
          <div class="pactions">
            <button onclick="renamePerson(${p.id},'${p.name.replace(/'/g,"\\'")}')">改名</button>
            <button class="danger" onclick="hidePerson(${p.id},'${p.name.replace(/'/g,"\\'")}')">隐藏</button>
          </div>
        </li>`;
      }).join('')}</ul>
    </div>`;
}

function addPerson() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { showToast('请输入姓名'); return; }
  if (DB.persons.find(p => p.name === name && p.active !== false)) { showToast('姓名已存在'); return; }
  const debt = parseFloat(document.getElementById('new-debt').value) || 0;
  DB.persons.push({ id: DB.nextPid++, name, initial_debt: debt });
  saveDB();
  showToast('已添加 ' + name);
  navigate('manage');
}

function renamePerson(pid, oldName) {
  const newName = prompt('新姓名：', oldName);
  if (!newName || !newName.trim()) return;
  const p = DB.persons.find(x => x.id === pid);
  if (!p) return;
  p.name = newName.trim();
  saveDB();
  showToast('已改名');
  navigate('manage');
}

function hidePerson(pid, name) {
  if (!confirm('确定隐藏 ' + name + ' 吗？\n隐藏后不会出现在列表中，但数据保留。')) return;
  const p = DB.persons.find(x => x.id === pid);
  if (!p) return;
  p.active = false;
  saveDB();
  showToast('已隐藏 ' + name);
  navigate('manage');
}

// ==================== 启动 ====================
(async function() {
  await initDB();
  navigate('dashboard');
})();
</script>
